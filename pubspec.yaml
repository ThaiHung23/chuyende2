name: shoe_store_app
description: Ứng dụng bán giày thể thao online chuyên nghiệp Flutter.

publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  badges: ^3.1.2
  intl: ^0.20.2
  shared_preferences: ^2.3.0
#  flutter_carousel_slider: ^1.1.0
  image_picker: ^1.1.2
  carousel_slider: ^5.0.0
  google_fonts: ^6.2.1
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.8
  cached_network_image: ^3.4.1
  fl_chart: ^0.68.0
  desktop_drop: ^0.4.4  # Hỗ trợ kéo thả
  cross_file: ^0.3.4+2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/


